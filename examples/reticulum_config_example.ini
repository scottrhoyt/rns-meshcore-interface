# Example Reticulum configuration for MeshCore Bridge
#
# Add this section to ~/.reticulum/config
# Make sure MeshCoreInterface.py is in ~/.reticulum/interfaces/

# Serial connection example
[[MeshCore Bridge Serial]]
  type = MeshCoreInterface
  enabled = true
  mode = gateway

  connection_type = serial
  serial_port = /dev/ttyACM0
  serial_baudrate = 115200

  # Peer MeshCore node public key (hex, min 12 chars / 6 bytes)
  peer_address = a1b2c3d4e5f6

  # Airtime control
  tx_delay_ms = 500
  max_airtime_percent = 10

  # Optional: max chars per MeshCore message (default 200)
  # max_msg_len = 200

  # Optional: manual path as comma-separated hex hashes of repeater nodes
  # path = 23,5f,3a

  # Optional: allow flood routing fallback if manual path fails (default true)
  # allow_flood_fallback = true

  # Optional: max direct path retries per message (default 3)
  # max_retries = 3

  # Optional: max flood routing retries per message (default 2)
  # max_flood_retries = 2

  # Optional: send flood advert on startup (default true)
  # advert_on_start = true

  # Optional: periodic flood advert interval in seconds (default 0 = disabled)
  # advert_interval = 300


